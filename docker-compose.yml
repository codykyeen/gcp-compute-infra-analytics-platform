version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/service-account.json
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: 60
  volumes:
  - ./airflow/dags:/opt/airflow/dags
  - ./credentials:/opt/airflow/credentials  
  - ./ingestion:/opt/airflow/ingestion
  - ./dbt_profiles:/opt/airflow/dbt_profiles
  - ./dbt:/opt/airflow/dbt
  - ./scripts:/opt/airflow/scripts
  - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password <password> --firstname Airflow --lastname Admin --role Admin --email <email>"
    restart: "no"

volumes:
  postgres-db-volume:
